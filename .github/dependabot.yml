version: 2

updates:
  # ---------------------------------------------------------------------------
  # Python dependencies (requirements.txt)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "chore(deps)"
    ignore:
      # yfinance minor versions can silently break column-name contracts —
      # review those manually before merging.
      - dependency-name: "yfinance"
        update-types: ["version-update:semver-minor"]

  # ---------------------------------------------------------------------------
  # GitHub Actions (uses: owner/action@vX)
  # ---------------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Europe/Lisbon"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "chore(deps)"

name: Update under-20 stocks CSV

on:
  schedule:
    # Every day at 01:00 UTC (weekday filter is handled in the script itself)
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_price:
        description: "Maximum close price (USD) for the ticker filter"
        required: false
        default: "30"

jobs:
  update-under20-csv:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update script
        run: |
          python scripts/update_under20_master_csv.py \
            --max-price "${{ github.event.inputs.max_price || '30' }}"

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes
        run: |
          git status

          if [ -n "$(git status --porcelain)" ]; then
            # Master history CSV — always updated when tickers are found
            git add data/under20_history.csv

            # NASDAQ cache — persist so it is not re-fetched from Wikipedia every run
            if [ -f data/nasdaq_tickers.csv ]; then
              git add data/nasdaq_tickers.csv
            fi

            # Run log — append-only record of every pipeline execution
            if [ -f data/run_log.csv ]; then
              git add data/run_log.csv
            fi

            git commit -m "chore: update under-20 stocks CSV [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upload output as artifact on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: under20-partial-output
          path: |
            data/under20_history.csv
            data/nasdaq_tickers.csv
            data/run_log.csv
          if-no-files-found: ignore
          retention-days: 7

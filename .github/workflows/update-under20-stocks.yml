name: Update under-20 stocks CSV

on:
  schedule:
    # Every day at 01:00 UTC
    - cron: "0 1 * * *"
  workflow_dispatch:
    inputs:
      max_price:
        description: "Maximum close price (USD) for the ticker filter"
        required: false
        default: "30"

jobs:
  update-under20-csv:
    runs-on: ubuntu-latest

    permissions:
      contents: write  # needed to push the updated CSV

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          else
            pip install "pandas[lxml]" yfinance lxml requests
          fi

      - name: Run update script
        run: |
          python scripts/update_under20_master_csv.py \
            --max-price "${{ github.event.inputs.max_price || '30' }}"

      - name: Configure git for commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push changes if any
        run: |
          git status

          if [ -n "$(git status --porcelain)" ]; then
            # Stage the master history CSV (always updated when tickers are found)
            git add data/under20_history.csv

            # Stage the NASDAQ cache if it was created or refreshed this run.
            # Without this the cache is never persisted, so every run re-fetches
            # the NASDAQ-100 list from Wikipedia — adding latency and a network
            # failure point.
            if [ -f data/nasdaq_tickers.csv ]; then
              git add data/nasdaq_tickers.csv
            fi

            git commit -m "chore: update under-20 stocks CSV [skip ci]"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Upload CSVs as workflow artifact on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: under20-partial-output
          path: |
            data/under20_history.csv
            data/nasdaq_tickers.csv
          if-no-files-found: ignore
          retention-days: 7
